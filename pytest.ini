[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    asyncio: mark test as async
    level1: Level 1 - Health checks
    level2: Level 2 - Registration
    level3: Level 3 - Authentication
    level4: Level 4 - Sessions
    level5: Level 5 - Admin operations
    level6: Level 6 - Security tests
